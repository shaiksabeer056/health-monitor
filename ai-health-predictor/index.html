<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device=device-width, initial-scale=1.0">
    <title>AI Health Chat Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            color: white;
        }
        .chat-container {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            width: 95%;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            margin: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .message {
            margin-bottom: 20px;
            padding: 15px 20px;
            border-radius: 20px;
            max-width: 70%;
            animation: slideIn 0.3s ease;
        }
        .message.user {
            background: #4CAF50;
            color: white;
            margin-left: auto;
        }
        .message.ai {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            margin-right: auto;
        }
        .input-area {
            padding: 20px;
            background: white;
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #eee;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        #sendBtn {
            padding: 15px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .medical-risk {
            background: #ffebee !important;
            border-left: 4px solid #f44336;
        }
        .low-risk {
            background: #e8f5e8 !important;
            border-left: 4px solid #4CAF50;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏥 AI Health Assistant</h1>
        <p>Talk to me about your health concerns</p>
    </div>
    
    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="message ai">
                Hi! I'm your medical AI assistant. Tell me your symptoms or ask health questions:
                <ul style="margin-top: 10px; padding-left: 20px;">
                    <li>"chest pain and shortness of breath"</li>
                    <li>"persistent headache and fatigue"</li>
                    <li>"fever for 3 days"</li>
                </ul>
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Describe your symptoms..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // Medical knowledge base
        const medicalKB = {
            symptoms: {
                'chest pain': { risk: 'HIGH', conditions: ['Heart attack', 'Angina', 'Pneumonia'], action: 'Seek emergency care immediately' },
                'shortness of breath': { risk: 'HIGH', conditions: ['Heart failure', 'Asthma attack', 'Pulmonary embolism'], action: 'Emergency evaluation needed' },
                'severe headache': { risk: 'MEDIUM', conditions: ['Migraine', 'Stroke warning', 'Meningitis'], action: 'Monitor, seek care if worsening' },
                'fever': { risk: 'LOW', conditions: ['Viral infection', 'Flu', 'UTI'], action: 'Hydrate, monitor temperature' },
                'persistent cough': { risk: 'MEDIUM', conditions: ['Bronchitis', 'Pneumonia', 'COVID-19'], action: 'Check for shortness of breath' },
                'abdominal pain': { risk: 'MEDIUM', conditions: ['Appendicitis', 'Gallstones', 'Kidney stones'], action: 'Location matters - upper/lower?' },
                'dizziness': { risk: 'MEDIUM', conditions: ['Low blood pressure', 'Anemia', 'Dehydration'], action: 'Check blood pressure if possible' },
                'fatigue': { risk: 'LOW', conditions: ['Anemia', 'Thyroid disorder', 'Depression'], action: 'Common, check other symptoms' }
            },
            keywords: {
                'urgent': 'MEDIUM',
                'severe': 'HIGH',
                'sudden': 'HIGH',
                'unbearable': 'HIGH',
                'continuous': 'MEDIUM'
            }
        };

        function addMessage(sender, content, className = '') {
            const div = document.createElement('div');
            div.className = `message ${sender} ${className}`;
            div.innerHTML = `<strong>${sender === 'user' ? 'You' : 'AI Assistant'}:</strong> ${content}`;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function analyzeSymptoms(text) {
            text = text.toLowerCase();
            let riskLevel = 'LOW';
            let conditions = [];
            let action = 'Monitor your symptoms';
            let matchedSymptoms = [];

            // Check keywords first
            Object.keys(medicalKB.keywords).forEach(keyword => {
                if (text.includes(keyword)) {
                    riskLevel = medicalKB.keywords[keyword];
                }
            });

            // Check symptoms
            Object.keys(medicalKB.symptoms).forEach(symptom => {
                if (text.includes(symptom)) {
                    const info = medicalKB.symptoms[symptom];
                    matchedSymptoms.push(symptom);
                    conditions.push(...info.conditions);
                    if (info.risk === 'HIGH') riskLevel = 'HIGH';
                    action = info.action;
                }
            });

            return {
                riskLevel,
                conditions: [...new Set(conditions)],
                action,
                matchedSymptoms
            };
        }

        function respond(text) {
            const analysis = analyzeSymptoms(text);
            
            let response = '';
            if (analysis.matchedSymptoms.length > 0) {
                response = `**Detected symptoms**: ${analysis.matchedSymptoms.join(', ')}<br>`;
                response += `<strong>Risk Level: ${analysis.riskLevel}</strong><br>`;
                response += `<strong>Possible conditions</strong>: ${analysis.conditions.join(', ')}<br><br>`;
            }
            response += `<strong>Recommendation</strong>: ${analysis.action}`;
            
            const className = analysis.riskLevel === 'HIGH' ? 'medical-risk' : 
                            analysis.riskLevel === 'LOW' ? 'low-risk' : '';
            
            addMessage('ai', response, className);
        }

        // Event listeners
        function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;
            
            addMessage('user', text);
            inputEl.value = '';
            
            setTimeout(() => respond(text), 500);
        }

        inputEl.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        sendBtn.onclick = sendMessage;
    </script>
</body>
</html>
